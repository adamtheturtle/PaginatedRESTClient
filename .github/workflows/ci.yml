name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict

  macos:
    name: macOS (Swift ${{ matrix.swift }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        # The package requires swift-tools-version 6.2 (defaultIsolation, raw
        # identifiers, NonisolatedNonsendingByDefault). latest-stable Xcode on the
        # macos-26 image provides Swift 6.2+.
        swift: ["latest-stable"]
    steps:
      - uses: actions/checkout@v5
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.swift }}
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build --build-tests
      - name: Test
        run: swift test

  linux:
    name: Linux (Swift ${{ matrix.swift }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The core is Foundation-only and must stay Linux-clean.
        swift: ["6.2"]
    container: swift:${{ matrix.swift }}
    steps:
      - uses: actions/checkout@v5
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build --build-tests
      - name: Test
        run: swift test
